  napoli-lv-db:
    image: mysql:8.0
    container_name: napoli-lv-db
    restart: always
    environment:
      MYSQL_DATABASE: napoli_lv
      MYSQL_USER: napoli_lv
      MYSQL_PASSWORD: NapoliLV2026Secure
      MYSQL_ROOT_PASSWORD: RootNapoliLV2026Secure
    volumes:
      - napoli_lv_db_data:/var/lib/mysql
    networks:
      - n8n_default
    command: --max-allowed-packet=256M --innodb-buffer-pool-size=256M --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  napoli_lv_db_data:

networks:
  n8n_default:
    external: true
